databases:
  - name: uniconnect-db
    plan: free
    databaseName: dcdslproject
    user: uniconnect_user

services:
  - type: web
    name: uniconnect-backend
    runtime: node
    repo: https://github.com/sahilawatramani/Uniconnect
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: node Server.js
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: uniconnect-db
          property: connectionString
